<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policies</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f9; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 30px; color: #1a1a1a; }

    .policy-link { padding: 16px; background: white; border-radius: 8px; text-decoration: none; color: #0066cc; font-size: 1rem; border: 1px solid #ddd; transition: all 0.2s; }
    .policy-link:hover { background: #f0f0f0; border-color: #0066cc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Privacy Policies</h1>
    <div class="policies">
      <a href="shafio/" class="policy-link">Shafio</a>
